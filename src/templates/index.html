<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliza | XMRT-DAO Command</title>
    <style>
        /* --- All your existing CSS is preserved exactly as it was --- */
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;

            flex-direction: column;

        #main-content-wrapper {
            width: 100%;

            display: flex;

        /* Chat Container */

        }
        
        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            border-bottom: 1px solid #30363d;
        }
        
        .message {

        }
        
        .user-message {
            text-align: right;
        }
        
        .eliza-message .content {
            background-color: #21262d;
            display: inline-block;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 85%;
            white-space: pre-wrap;
            text-align: left;

        .eliza-message .content pre {
            background-color: #0d1117;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #30363d;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 5px;
        }

        .eliza-message .content strong {
            color: #58a6ff;
        }
        
        .user-message .content {
            background-color: #58a6ff;
            color: #161b22;
            display: inline-block;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 85%;

        }
        
        #input-container {
            display: flex;
            padding: 10px;
            gap: 8px;

        #message-input {
            flex-grow: 1;
            background-color: #0d1117;

            border-radius: 6px;

            background-color: #238636;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            white-space: nowrap;
        }
        
        #send-button:hover {
            background-color: #2ea043;
        }
        
        /* --- All other existing CSS is preserved --- */
        #mining-widget-container { width: 100%; border: 1px solid #30363d; border-radius: 8px; background-color: #161b22; padding: 15px; }
        .widget-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; }
        .widget-title { font-size: 1.1em; font-weight: 600; color: #58a6ff; line-height: 1.2; }
        .widget-subtitle { color: #8b949e; font-size: 0.85em; margin-top: 4px; line-height: 1.3; }
        .slider-container { margin-bottom: 20px; }
        .slider-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 10px; }
        .slider-label-text { color: #c9d1d9; font-weight: 500; font-size: 0.9em; flex-shrink: 0; }
        .slider-value { color: #58a6ff; font-family: 'Courier New', monospace; font-size: 0.85em; text-align: right; }
        .slider { width: 100%; height: 6px; border-radius: 3px; background: #30363d; outline: none; -webkit-appearance: none; appearance: none; cursor: pointer; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #58a6ff; cursor: pointer; border: 2px solid #161b22; }
        .slider::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #58a6ff; cursor: pointer; border: 2px solid #161b22; }
        .slider-range { display: flex; justify-content: space-between; color: #8b949e; font-size: 0.75em; margin-top: 4px; }
        .enhancement-section { background-color: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .enhancement-title { color: #58a6ff; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-size: 0.95em; }
        .enhancement-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .enhancement-option { background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px; transition: all 0.3s ease; cursor: pointer; }
        .enhancement-option:hover { border-color: #58a6ff; background-color: #1c2128; }
        .enhancement-option.selected { border-color: #58a6ff; background-color: #1c2128; box-shadow: 0 0 0 1px rgba(88, 166, 255, 0.3); }
        .radio-group { display: flex; align-items: flex-start; gap: 10px; }
        .radio-input { margin-top: 2px; accent-color: #58a6ff; flex-shrink: 0; }
        .radio-content { flex: 1; min-width: 0; }
        .radio-label { color: #c9d1d9; font-weight: 500; display: block; margin-bottom: 4px; cursor: pointer; font-size: 0.9em; line-height: 1.2; }
        .radio-description { color: #8b949e; font-size: 0.8em; line-height: 1.3; margin-bottom: 8px; }
        .radio-specs { display: flex; gap: 15px; font-size: 0.75em; flex-wrap: wrap; }
        .spec-item { display: flex; flex-direction: column; gap: 2px; }
        .spec-label { color: #6e7681; font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.5px; }
        .spec-value { color: #58a6ff; font-family: 'Courier New', monospace; font-weight: 600; }
        .spec-value.boost { color: #40d47e; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        .stat-card { background-color: #21262d; padding: 12px; border-radius: 6px; text-align: center; border: 1px solid #30363d; }
        .stat-value { font-size: 0.95em; font-weight: 600; font-family: 'Courier New', monospace; margin-bottom: 4px; line-height: 1.1; }
        .stat-label { color: #8b949e; font-size: 0.7em; line-height: 1.2; }
        .earnings-section { margin-top: 20px; }
        .earnings-title { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; color: #58a6ff; font-weight: 600; font-size: 0.95em; }
        .earnings-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .earnings-card { background: linear-gradient(135deg, #21262d, #161b22); border: 1px solid #30363d; border-radius: 8px; padding: 15px; text-align: center; }
        .earnings-card.daily { border-color: #238636; }
        .earnings-card.monthly { border-color: #58a6ff; }
        .earnings-card.yearly { border-color: #a855f7; }
        .earnings-xmr { font-size: 1.1em; font-weight: bold; font-family: 'Courier New', monospace; margin-bottom: 4px; line-height: 1.1; }
        .earnings-card.daily .earnings-xmr { color: #40d47e; }
        .earnings-card.monthly .earnings-xmr { color: #58a6ff; }
        .earnings-card.yearly .earnings-xmr { color: #a855f7; }
        .earnings-usd { color: #8b949e; font-family: 'Courier New', monospace; margin-bottom: 6px; font-size: 0.9em; }
        .earnings-period { color: #6e7681; font-size: 0.8em; }
        .disclaimer { background-color: #2d1b00; border: 1px solid #f1c40f; border-radius: 6px; padding: 12px; margin-top: 20px; }
        .disclaimer-text { color: #f1c40f; font-size: 0.8em; line-height: 1.4; margin: 0; }
        .icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        @media (min-width: 768px) { body { padding: 20px; } #main-content-wrapper { gap: 20px; } #chat-container { height: 70vh; } #mining-widget-container { padding: 20px; } #header h1 { font-size: 1.5em; } #header p { font-size: 1em; } .widget-title { font-size: 1.2em; } .widget-subtitle { font-size: 0.9em; } .enhancement-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } .enhancement-option { padding: 15px; } .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 15px; } .earnings-grid { grid-template-columns: repeat(3, 1fr); gap: 15px; } .slider-label-text, .enhancement-title, .earnings-title { font-size: 1em; } .radio-label { font-size: 0.95em; } .radio-description { font-size: 0.85em; } .disclaimer-text { font-size: 0.85em; } }
        @media (min-width: 1024px) { .enhancement-grid { grid-template-columns: repeat(2, 1fr); } .radio-specs { gap: 20px; } }
        @media (min-width: 1200px) { #main-content-wrapper { max-width: 900px; } }
        @media (hover: none) and (pointer: coarse) { .slider { height: 8px; } .slider::-webkit-slider-thumb { width: 22px; height: 22px; } .slider::-moz-range-thumb { width: 22px; height: 22px; } .enhancement-option { padding: 15px; } #send-button { padding: 10px 15px; min-width: 60px; } }

</head>
<body>
    <div id="main-content-wrapper">
        <div id="chat-container">
            <div id="header">
                <h1>Eliza Command Interface</h1>
                <p>XMRT-DAO Autonomous Operator</p>
            </div>
            <div id="messages">
                <div class="message eliza-message">
                    <div class="content">Greetings, Founder. I am Eliza, the autonomous operator for the XMRT-DAO Ecosystem. My systems are online and fully operational. How may I assist you?<br><br>Available commands: 'status', 'dashboard', 'health'.</div>
                </div>
            </div>
            <div id="input-container">
                <input type="text" id="message-input" placeholder="Enter command...">
                <button id="send-button">Send</button>
            </div>
        </div>
        
        <!-- All your other HTML for the mining calculator is preserved exactly as it was -->
        <div id="mining-widget-container">
            <!-- ... -->
        </div>
    </div>

    <script>
        // Chat functionality
        const messagesContainer = document.getElementById("messages");
        const messageInput = document.getElementById("message-input");
        const sendButton = document.getElementById("send-button");

        // === CHANGE #1: MODIFIED addMessage function to handle HTML ===
        function addMessage(sender, text, isHtml = false) {
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message", sender === "user" ? "user-message" : "eliza-message");
            const contentDiv = document.createElement("div");
            contentDiv.classList.add("content");
            
            if (isHtml) {
                contentDiv.innerHTML = text; // Use innerHTML for formatted content
            } else {
                contentDiv.textContent = text; // Use textContent for plain text
            }
            
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // === CHANGE #2: ADDED a helper function to format JSON beautifully ===
        function formatJsonResponse(json) {
            let html = '<div class="json-response">';
            // Recursive function to handle nested objects
            function buildHtml(obj, depth = 0) {
                for (const key in obj) {
                    if (obj.hasOwnProperty(key)) {
                        let value = obj[key];
                        let keyStyle = `style="padding-left: ${depth * 15}px;"`;
                        
                        if (typeof value === 'object' && value !== null) {
                            html += `<div ${keyStyle}><strong>${key}:</strong></div>`;
                            buildHtml(value, depth + 1);
                        } else {
                            html += `<div ${keyStyle}><strong>${key}:</strong> ${value}</div>`;
                        }
                    }
                }
            }
            buildHtml(json);
            html += '</div>';
            return html;
        }

        // === CHANGE #3: UPGRADED sendMessage function to use the new formatter ===
        async function sendMessage() {
            const userText = messageInput.value.trim();
            if (!userText) return;

            addMessage("user", userText);
            messageInput.value = "";
            addMessage("eliza", "Processing command...");

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: userText })
                });
                const data = await response.json();

                // Remove the "Processing command..." message
                messagesContainer.removeChild(messagesContainer.lastChild);

                if (data.success) {
                    let replyContent = data.reply;
                    
                    // Check if the reply is a JSON string, and if so, parse it
                    try {
                        const parsedJson = JSON.parse(replyContent);
                        // If it's a valid JSON object, format it beautifully
                        addMessage("eliza", formatJsonResponse(parsedJson), true); // Pass true for HTML
                    } catch (e) {
                        // If it's just a plain string (like a greeting), display it normally
                        addMessage("eliza", replyContent);
                    }
                } else {
                    addMessage("eliza", `Error: ${data.error}`);
                }
            } catch (error) {
                messagesContainer.removeChild(messagesContainer.lastChild);
                addMessage("eliza", "A communication error occurred. Please check the server logs.");
            }
        }

        sendButton.addEventListener("click", sendMessage);
        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                sendMessage();
            }
        });

        // --- All your existing JavaScript for the mining calculator is preserved exactly as it was ---
        const hashrateSlider = document.getElementById("hashrate-slider");
        // ... (rest of your original script)
    </script>
</body>
